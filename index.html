    <title>Value Tracker</title>
    <style>
      :root {
        --bg: #0d0f14;
        --bg2: #13161e;
        --bg3: #1a1d27;
        --border: #2a2d3a;
        --border2: #3a3d4a;
        --text: #e8eaf0;
